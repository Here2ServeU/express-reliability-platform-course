# Local testing stack for V8 AIOps incident management.
# Brings up flask-api, web-ui, prometheus, grafana, and alertmanager so the
# AIOps scripts have a real platform to poll, score, and break.
#
#   docker compose up --build -d
#   curl http://localhost:8080/api/health   # served by web-ui -> proxied to flask-api
#   ./scripts/aiops_local_incident_test.sh
#   docker compose down                     # add -v to also drop the grafana-data volume

services:
  flask-api:
    build: ./apps/flask-api
    container_name: flask-api
    ports:
      - "5050:5000"
    restart: unless-stopped

  web-ui:
    build: ./apps/web-ui
    container_name: web-ui
    ports:
      - "8080:80"
    depends_on:
      - flask-api
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert.rules.yml:/etc/prometheus/alert.rules.yml
    ports:
      - "9090:9090"
    depends_on:
      - flask-api
      - alertmanager
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    volumes:
      - ./monitoring/alertmanager:/etc/alertmanager
    ports:
      - "9093:9093"
    restart: unless-stopped

volumes:
  grafana-data:
