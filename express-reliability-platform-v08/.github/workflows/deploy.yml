name: Deploy Platform

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-platform-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  CLUSTER: reliability-platform-cluster
  NAMESPACE: platform

jobs:
  scan-images:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      security-events: write   # Required to upload SARIF results to GitHub
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - name: Build and scan each image
        run: |
          for SVC in flask-api node-api web-ui; do
            echo "=== Scanning: ${SVC} ==="
            # Build the image locally for scanning (not pushed yet)
            docker buildx build --platform linux/amd64 \
              -t ${SVC}:scan-candidate ./apps/${SVC}
            # Run Trivy scan
            # --exit-code 1 makes the job fail if vulnerabilities are found
            # --severity HIGH,CRITICAL blocks on serious issues only
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v $HOME/.cache/trivy:/root/.cache/trivy \
              aquasec/trivy:latest image \
              --exit-code 1 \
              --severity HIGH,CRITICAL \
              --ignore-unfixed \
              --format table \
              ${SVC}:scan-candidate
            echo "${SVC}: SCAN PASSED"
          done

  checkov-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkov on Terraform
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          output_format: cli
          # Soft fail for now — prints findings but does not block the pipeline
          # Change to soft_fail: false when you are ready to enforce
          soft_fail: true
          skip_check: CKV_AWS_111   # Skip wildcard IAM check (course uses admin role)

  risk-score:
    runs-on: ubuntu-latest
    needs: scan-images
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # Need HEAD and HEAD~1 for diff
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - name: Configure kubectl
        run: |
          CLUSTER=$(terraform -chdir=terraform/live output -raw cluster_name 2>/dev/null || echo '')
          [ -n "$CLUSTER" ] && aws eks update-kubeconfig --name $CLUSTER --region us-east-1 || true
      - name: Calculate and apply risk score
        run: |
          chmod +x scripts/risk_score.sh
          ./scripts/risk_score.sh

  deploy-shared:
    runs-on: ubuntu-latest
    needs: risk-score
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - uses: hashicorp/setup-terraform@v3
      - name: Apply shared layer
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          BUCKET=reliability-platform-v08-tfstate-${ACCOUNT}
          terraform -chdir=terraform/shared init -reconfigure \
            -backend-config="bucket=${BUCKET}" \
            -backend-config="key=shared/v8/terraform.tfstate"
          terraform -chdir=terraform/shared apply -auto-approve

  deploy-live:
    runs-on: ubuntu-latest
    needs: deploy-shared
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - uses: hashicorp/setup-terraform@v3
      - name: Apply live layer
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          BUCKET=reliability-platform-v08-tfstate-${ACCOUNT}
          terraform -chdir=terraform/live init -reconfigure \
            -backend-config="bucket=${BUCKET}" \
            -backend-config="key=live/v8/terraform.tfstate"
          terraform -chdir=terraform/live apply -auto-approve \
            -var "state_bucket=${BUCKET}"

  deploy-apps:
    runs-on: ubuntu-latest
    needs: deploy-live
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - uses: azure/setup-helm@v4
      - name: Configure kubectl
        run: aws eks update-kubeconfig --name ${CLUSTER} --region ${AWS_REGION}
      - name: Push images and deploy Helm charts
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          ECR=${ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/reliability-platform
          aws ecr get-login-password --region ${AWS_REGION} | \
            docker login --username AWS --password-stdin \
            ${ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com
          for SVC in flask-api node-api web-ui; do
            docker buildx build --platform linux/amd64 \
              -t ${ECR}/${SVC}:latest --push ./apps/${SVC} 2>/dev/null || true
            helm upgrade --install "$SVC" "platform/helm/$SVC" \
              --namespace ${NAMESPACE} --create-namespace \
              --set image.repository="${ECR}/$SVC"
          done
      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/flask-api-flask-api -n ${NAMESPACE}
          kubectl rollout status deployment/node-api-node-api -n ${NAMESPACE}
          kubectl rollout status deployment/web-ui-web-ui -n ${NAMESPACE}
