server {
    listen 80;
    server_name _;

    # Serve the V8 AIOps incident-intelligence console.
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the flask-api service so the AIOps scripts can
    # poll http://localhost:8080/api/health during local testing.
    location /api/ {
        proxy_pass http://flask-api:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
