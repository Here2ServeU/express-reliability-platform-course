replicaCount: 2

image:
  repository: 730335276920.dkr.ecr.us-east-1.amazonaws.com/reliability-platform/flask-api
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 5000

# Ported from V5's platform-config ConfigMap. flask-api only reads PORT, so it
# gets just NODE_ENV here (V5 shared one ConfigMap across both APIs; V6 gives
# each service only the keys it uses). Add more keys to inject more env vars.
env:
  NODE_ENV: "production"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

probes:
  liveness:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3
  readiness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 3
