replicaCount: 2

image:
  repository: 730335276920.dkr.ecr.us-east-1.amazonaws.com/reliability-platform/web-ui
  tag: latest
  pullPolicy: Always

service:
  type: LoadBalancer
  port: 80

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 128Mi

probes:
  liveness:
    path: /
    initialDelaySeconds: 15
    periodSeconds: 10
    failureThreshold: 3
  readiness:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 3
