apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-node-api
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-node-api
    team: platform
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-node-api
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-node-api
        team: platform
    spec:
      containers:
        - name: node-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3000

          # Replaces V5's `platform-config` ConfigMap (k8s/configmap.yaml +
          # envFrom). FLASK_BASE_URL must point at flask-api's in-cluster
          # Service, which Helm names <release>-flask-api = "flask-api-flask-api".
          # Without it node-api falls back to http://localhost:5000 and /score
          # 500s with "flask-api unavailable".
          env:
          {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
          {{- end }}

          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: 3000
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}

          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: 3000
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}

          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-node-api
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-node-api
    team: platform
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ .Release.Name }}-node-api
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: 3000
