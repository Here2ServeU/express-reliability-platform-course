name: Provision AWS Infrastructure
on:
  push:
    branches:
      - main
jobs:
  terraform-live:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform Init (live)
        run: terraform -chdir=environments/live init
      - name: Terraform Plan (live)
        run: terraform -chdir=environments/live plan
      - name: Terraform Apply (live)
        run: terraform -chdir=environments/live apply -auto-approve

  terraform-shared:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform Init (shared)
        run: terraform -chdir=environments/shared init
      - name: Terraform Plan (shared)
        run: terraform -chdir=environments/shared plan
      - name: Terraform Apply (shared)
        run: terraform -chdir=environments/shared apply -auto-approve

  helm-deploy:
    runs-on: ubuntu-latest
    needs: [terraform-live]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Helm
        run: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      - name: Deploy Fintech Service
        run: helm upgrade --install fintech ./environments/live/helm/fintech-chart --namespace fintech --create-namespace
      - name: Deploy Hospital Service
        run: helm upgrade --install hospital ./environments/live/helm/hospital-chart --namespace hospital --create-namespace
      - name: Deploy UI Portal
        run: helm upgrade --install ui ./environments/live/helm/ui-chart --namespace ui --create-namespace

  notify:
    runs-on: ubuntu-latest
    needs: [terraform-live, terraform-shared, helm-deploy]
    steps:
      - name: Send notification
        run: echo "Provisioning and deployment complete!"
