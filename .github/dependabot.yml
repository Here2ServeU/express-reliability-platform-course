version: 2
updates:
  - package-ecosystem: pip
    directory: "/express-reliability-platform-v03/apps/flask-api"
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - python
    groups:
      python-dependencies:
        patterns:
          - "*"
    ignore:
      - dependency-name: "flask"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: pip
    directory: "/express-reliability-platform-v04/apps/flask-api"
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - python
    groups:
      python-dependencies:
        patterns:
          - "*"
    ignore:
      - dependency-name: "flask"
        update-types:
          - "version-update:semver-major"