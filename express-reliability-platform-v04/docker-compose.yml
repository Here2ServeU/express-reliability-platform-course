services:

  flask-api:
    build: ./apps/flask-api
    container_name: flask-api
    ports:
      - "5050:5000"   # 5050 avoids macOS AirPlay conflict
    restart: unless-stopped

  node-api:
    build: ./apps/node-api
    container_name: node-api
    environment:
      FLASK_BASE_URL: http://flask-api:5000
    ports:
      - "3000:3000"
    depends_on:
      - flask-api
    restart: unless-stopped

  web-ui:
    build: ./apps/web-ui
    container_name: web-ui
    ports:
      - "8080:80"
    depends_on:
      - node-api
    restart: unless-stopped

  # NEW: Prometheus — the collector
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert.rules.yml:/etc/prometheus/alert.rules.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    restart: unless-stopped

  # NEW: Grafana — the dashboard screen
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
    restart: unless-stopped

volumes:
  grafana-storage:
