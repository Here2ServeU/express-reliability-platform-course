global:
  scrape_interval: 15s   # Visit every service every 15 seconds

scrape_configs:
  - job_name: 'node-api'
    static_configs:
      - targets: ['node-api:3000']   # Container name and container port

  - job_name: 'flask-api'
    static_configs:
      - targets: ['flask-api:5000']   # Container port — NOT host port 5050
