# Observability stack for V10: Prometheus + Alertmanager + Grafana.
#
# Bring it up:
#   docker compose -f docker-compose.observability.yml up -d
#
# Then, in a separate terminal, start the Slack bridge so Alertmanager can route
# firing alerts to Slack (it dry-runs when SLACK_WEBHOOK_URL is unset):
#   python3 alerting/alertmanager_webhook.py
#
# UIs:
#   Prometheus    http://localhost:9090
#   Alertmanager  http://localhost:9093
#   Grafana       http://localhost:3000  (admin / admin)

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: v10-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

  alertmanager:
    image: prom/alertmanager:latest
    container_name: v10-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: v10-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring:/var/lib/grafana/dashboards:ro
