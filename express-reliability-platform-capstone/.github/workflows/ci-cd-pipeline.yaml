name: CI/CD Pipeline with Security Scanning

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: express-platform-eks-live
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

permissions:
  contents: read
  id-token: write
  security-events: write
  pull-requests: write

jobs:
  security-scan:
    name: Security Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-fs-results.sarif'

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --sarif-file-output=snyk-results.sarif
        continue-on-error: true

      - name: Upload Snyk results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'snyk-results.sarif'

  policy-check:
    name: OPA Policy Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest

      - name: Run OPA tests
        run: |
          opa test policies/opa/*.rego -v

      - name: Validate Kubernetes manifests with OPA
        run: |
          # Validate Helm templates
          for chart in infrastructure/helm/charts/*; do
            if [ -d "$chart" ]; then
              echo "Validating $chart"
              helm template $chart | opa eval -f pretty -d policies/opa/kubernetes.rego -I "data.kubernetes.admission.deny"
            fi
          done

  build-and-scan-images:
    name: Build and Scan Container Images
    runs-on: ubuntu-latest
    needs: [security-scan, policy-check]
    strategy:
      matrix:
        service: [node-api, flask-api, web-ui]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/${{ matrix.service }}
          push: false
          load: true
          tags: ${{ env.ECR_REGISTRY }}/express-platform-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner (image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/express-platform-${{ matrix.service }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-image-${{ matrix.service }}.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy image scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-image-${{ matrix.service }}.sarif'

      - name: Run Snyk container scan
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ${{ env.ECR_REGISTRY }}/express-platform-${{ matrix.service }}:${{ github.sha }}
          args: --severity-threshold=high --file=apps/${{ matrix.service }}/Dockerfile
        continue-on-error: true

      - name: Push image to ECR (only on main)
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ env.ECR_REGISTRY }}/express-platform-${{ matrix.service }}:${{ github.sha }}
          docker tag ${{ env.ECR_REGISTRY }}/express-platform-${{ matrix.service }}:${{ github.sha }} \
                     ${{ env.ECR_REGISTRY }}/express-platform-${{ matrix.service }}:latest
          docker push ${{ env.ECR_REGISTRY }}/express-platform-${{ matrix.service }}:latest

  deploy:
    name: Deploy to EKS via ArgoCD
    runs-on: ubuntu-latest
    needs: [build-and-scan-images]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Sync ArgoCD applications
        run: |
          # Login to ArgoCD
          argocd login ${{ secrets.ARGOCD_SERVER }} --username admin --password ${{ secrets.ARGOCD_PASSWORD }} --insecure

          # Update image tags and sync
          argocd app set node-api -p image.tag=${{ github.sha }}
          argocd app set flask-api -p image.tag=${{ github.sha }}
          argocd app set web-ui -p image.tag=${{ github.sha }}

          # Sync applications
          argocd app sync node-api flask-api web-ui --prune

          # Wait for sync to complete
          argocd app wait node-api flask-api web-ui --health --timeout 600

      - name: Verify deployment
        run: |
          kubectl get pods -n express-platform
          kubectl get svc -n express-platform

  compliance-check:
    name: Compliance and Policy Enforcement
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Run OPA Gatekeeper audit
        run: |
          # Get constraint violations
          kubectl get constraints -A -o json | jq '.items[] | select(.status.totalViolations > 0)'

      - name: Generate compliance report
        run: |
          echo "## Compliance Report" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "### Security Scans: Passed" >> $GITHUB_STEP_SUMMARY
          echo "### Policy Checks: Passed" >> $GITHUB_STEP_SUMMARY
          echo "### Container Scans: Passed" >> $GITHUB_STEP_SUMMARY
