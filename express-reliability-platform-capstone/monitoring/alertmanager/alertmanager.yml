global:
  resolve_timeout: 5m

# Alertmanager routes every firing alert to the local webhook receiver
# (alerting/alertmanager_webhook.py). The receiver enriches the alert with
# the exact remediation command and posts it to Slack so the on-call engineer
# can resolve the incident by running one script.
route:
  group_by:        ['alertname', 'severity']
  group_wait:      30s
  group_interval:  5m
  repeat_interval: 3h
  receiver:        'slack-bridge'

receivers:
  - name: 'slack-bridge'
    webhook_configs:
      - url:           'http://host.docker.internal:5001/alerts'
        send_resolved:  true
