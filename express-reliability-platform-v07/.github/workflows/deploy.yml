name: Deploy Platform

# V7 four-job pipeline: changes ─┬─► deploy-shared ─► deploy-live ─┐
#                                └─► build-images (only if app source changed) ─┴─► deploy-apps
#
# Auth: passwordless via GitHub OIDC. The repo only stores AWS_ROLE_ARN —
# the IAM role's trust policy must allow this repo (and ideally this branch)
# to assume it via token.actions.githubusercontent.com.
#
# Bootstrap (state bucket + lock table + ECR repos) is NOT in this pipeline.
# Run it once locally with `terraform -chdir=terraform/bootstrap apply` before
# the first push, or add a separate bootstrap workflow guarded by
# workflow_dispatch. Decoupling bootstrap from the per-push pipeline keeps
# the state backend stable across deploys.
#
# Image build strategy: build-images runs only when apps/ changes in this
# repo, OR when the workflow itself changes (so the user can force a rebuild
# by editing this file). All three services live in this repo's apps/
# directory — V7 is fully self-contained, no cross-repo source dependencies.
# Images are tagged BOTH `:latest` (what Helm deploys) and `:<commit-sha>`
# (forensic trail per deploy).

on:
  push:
    branches: [main]
  workflow_dispatch:

# Serialize runs on the same branch so two quick pushes don't race on
# `terraform apply`. The DynamoDB lock would catch the conflict, but we'd
# burn a runner and get a confusing failure. cancel-in-progress: false is
# deliberate — cancelling mid-apply can orphan AWS resources.
concurrency:
  group: deploy-platform-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  PROJECT: reliability-platform
  CLUSTER: reliability-platform-cluster
  NAMESPACE: platform
  STATE_BUCKET_PREFIX: reliability-platform-v07-tfstate
  LOCK_TABLE: terraform-state-lock-v07

jobs:

  # Detect what kind of change this push contains. Apps changes trigger
  # build-images; Terraform-only changes skip it (saves ~3-5 min per deploy).
  changes:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.filter.outputs.apps }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            apps:
              - 'apps/**'
              - '.github/workflows/deploy.yml'

  # Builds and pushes flask-api, node-api, web-ui to ECR with both `:latest`
  # and `:<sha>` tags. Runs in parallel with the Terraform jobs since ECR
  # repos already exist (created once by `terraform/bootstrap` locally).
  # On Terraform-only pushes, this job is skipped entirely.
  build-images:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.apps == 'true'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Resolve ECR base URI
        id: ecr
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "base=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${PROJECT}" >> "$GITHUB_OUTPUT"

      # EKS nodes run linux/amd64. Apple Silicon developers building locally
      # need buildx --platform linux/amd64; CI runners are already amd64,
      # but we set the platform explicitly so behavior is identical to local.
      - name: Build and push flask-api
        uses: docker/build-push-action@v5
        with:
          context: apps/flask-api
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr.outputs.base }}/flask-api:latest
            ${{ steps.ecr.outputs.base }}/flask-api:${{ github.sha }}

      - name: Build and push node-api
        uses: docker/build-push-action@v5
        with:
          context: apps/node-api
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr.outputs.base }}/node-api:latest
            ${{ steps.ecr.outputs.base }}/node-api:${{ github.sha }}

      - name: Build and push web-ui
        uses: docker/build-push-action@v5
        with:
          context: apps/web-ui
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr.outputs.base }}/web-ui:latest
            ${{ steps.ecr.outputs.base }}/web-ui:${{ github.sha }}

  deploy-shared:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - name: Resolve V7 state bucket name
        id: backend
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "state_bucket=${STATE_BUCKET_PREFIX}-${ACCOUNT_ID}" >> "$GITHUB_OUTPUT"

      - name: Init shared layer with V7 backend
        run: |
          terraform -chdir=terraform/shared init -reconfigure -input=false \
            -backend-config="bucket=${{ steps.backend.outputs.state_bucket }}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${LOCK_TABLE}" \
            -backend-config="key=shared/v7/terraform.tfstate"

      - name: Apply shared layer
        run: terraform -chdir=terraform/shared apply -auto-approve

  deploy-live:
    runs-on: ubuntu-latest
    needs: deploy-shared
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - name: Resolve V7 state bucket name
        id: backend
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "state_bucket=${STATE_BUCKET_PREFIX}-${ACCOUNT_ID}" >> "$GITHUB_OUTPUT"

      - name: Init live layer with V7 backend
        run: |
          terraform -chdir=terraform/live init -reconfigure -input=false \
            -backend-config="bucket=${{ steps.backend.outputs.state_bucket }}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${LOCK_TABLE}" \
            -backend-config="key=live/v7/terraform.tfstate"

      - name: Apply live layer
        # state_bucket is also passed to the live module so its
        # terraform_remote_state data source reads from the right bucket.
        run: |
          terraform -chdir=terraform/live apply -auto-approve \
            -var "state_bucket=${{ steps.backend.outputs.state_bucket }}"

  deploy-apps:
    runs-on: ubuntu-latest
    # build-images runs in parallel with deploy-shared/deploy-live and is
    # skipped on Terraform-only pushes. The `if: always()` clause lets this
    # job run when build-images was skipped (no app changes); the inner
    # conditions still require deploy-live to have succeeded.
    needs: [deploy-live, build-images]
    if: |
      always() &&
      needs.deploy-live.result == 'success' &&
      (needs.build-images.result == 'success' || needs.build-images.result == 'skipped')
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Configure kubectl
        run: aws eks update-kubeconfig --name "${CLUSTER}" --region "${AWS_REGION}"

      - name: Resolve ECR base URI
        id: ecr
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "ecr_base=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${PROJECT}" >> "$GITHUB_OUTPUT"

      - name: Deploy Helm charts
        # --set image.repository overrides the YOUR_ACCOUNT_ID placeholder
        # in each chart's values.yaml so Helm pulls from the V7 ECR repos.
        # Images are pushed by the build-images job earlier in this workflow
        # (when apps/ changes) or persist from a previous deploy (Terraform-
        # only pushes). pullPolicy: Always in values.yaml ensures kubelet
        # picks up new :latest digests on each rollout.
        run: |
          for SVC in flask-api node-api web-ui; do
            helm upgrade --install "$SVC" "helm/$SVC" \
              --namespace "${NAMESPACE}" --create-namespace \
              --set image.repository="${{ steps.ecr.outputs.ecr_base }}/$SVC"
          done

      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/flask-api-flask-api -n "${NAMESPACE}"
          kubectl rollout status deployment/node-api-node-api  -n "${NAMESPACE}"
          kubectl rollout status deployment/web-ui-web-ui      -n "${NAMESPACE}"

      # Runs only if a previous step in this job failed. Dumps pod state,
      # recent container logs, and namespace events so the CI log explains
      # *why* a rollout stalled (ImagePullBackOff, OOMKilled, CrashLoopBackOff,
      # readiness failure, etc.) instead of just reporting the timeout.
      - name: Diagnose failed rollout
        if: failure()
        run: |
          echo "=== pods ==="
          kubectl get pods -n "${NAMESPACE}" -o wide
          echo "=== describe pods ==="
          kubectl describe pods -n "${NAMESPACE}"
          echo "=== recent events ==="
          kubectl get events -n "${NAMESPACE}" --sort-by=.lastTimestamp | tail -50
          echo "=== logs (previous + current, all containers) ==="
          for pod in $(kubectl get pods -n "${NAMESPACE}" -o name); do
            echo "--- $pod ---"
            kubectl logs "$pod" -n "${NAMESPACE}" --all-containers --tail=100 || true
            kubectl logs "$pod" -n "${NAMESPACE}" --all-containers --previous --tail=100 || true
          done

      - name: Verify deployment
        run: kubectl get pods -n "${NAMESPACE}"
