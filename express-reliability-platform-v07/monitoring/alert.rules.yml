groups:
  - name: platform-alerts
    rules:

      - alert: ServiceDown
        expr:  up == 0
        for:   30s
        labels:
          severity: critical
        annotations:
          summary:     '{{ $labels.job }} is DOWN'
          description: 'Service {{ $labels.job }} has been unreachable for 30 consecutive seconds.'

      - alert: HighErrorRate
        expr:  rate(http_requests_total{status=~'5..'}[5m]) > 0.05
        for:   1m
        labels:
          severity: warning
        annotations:
          summary:     'High 5xx error rate on {{ $labels.job }}'
          description: 'More than 5% of requests are returning server errors.'

      - alert: HighLatency
        expr: |
          histogram_quantile(0.95,
            rate(http_request_duration_seconds_bucket[5m])
          ) > 0.5
        for:   2m
        labels:
          severity: warning
        annotations:
          summary: 'p95 latency above 500ms on {{ $labels.job }}'
