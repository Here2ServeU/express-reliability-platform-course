global:
  scrape_interval:     15s
  evaluation_interval: 15s

rule_files:
  - 'alert.rules.yml'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:

  - job_name: 'node-api'
    static_configs:
      - targets: ['node-api:3000']
    metrics_path: '/metrics'

  - job_name: 'flask-api'
    static_configs:
      - targets: ['flask-api:5000']
    metrics_path: '/metrics'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
