services:

  flask-api:
    build: ./apps/flask-api
    container_name: flask-api
    ports:
      - "5001:5000"
    restart: unless-stopped

  node-api:
    build: ./apps/node-api
    container_name: node-api
    environment:
      FLASK_BASE_URL: http://flask-api:5000
    ports:
      - "3000:3000"
    depends_on:
      - flask-api
    restart: unless-stopped

  web-ui:
    build: ./apps/web-ui
    container_name: web-ui
    ports:
      - "8080:80"
    depends_on:
      - node-api
    restart: unless-stopped
